<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory ERP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f5f5f5; }
        .container { height: 100vh; display: flex; flex-direction: column; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .page { display: none; }
        .page.active { display: block; }
        .item { background: white; padding: 12px; margin-bottom: 10px; border-radius: 5px; cursor: pointer; }
        .title { font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 5px; margin-top: 15px; cursor: pointer; font-weight: bold; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid #ddd; }
        .nav-btn { flex: 1; padding: 10px; background: none; border: none; font-size: 20px; cursor: pointer; }
        .nav-btn.active { background: #f0f0f0; }
        table { width: 100%; border-collapse: collapse; background: white; margin: 10px 0; }
        th, td { padding: 8px; border: 1px solid #ddd; font-size: 12px; text-align: center; }
        th { background: #34495e; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; }
        .modal.active { display: block; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; margin: 50px auto; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .form-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .form-buttons button { flex: 1; margin: 0; }
        .filter-box { background: white; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 2px solid #3498db; }
        .filter-box input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 3px; margin-bottom: 8px; }
        .back-btn { background: #95a5a6 !important; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>📋 Factory ERP</h1></header>
        
        <div class="content">
            <div id="home" class="page active">
                <div class="title">🏠 PARTIES</div>
                <div id="partiesDiv"></div>
                <button onclick="openAddParty()">➕ ADD PARTY</button>
            </div>

            <div id="designs" class="page">
                <button class="back-btn" onclick="goBack()">← BACK</button>
                <div class="title" id="desTitle"></div>
                <div id="designsDiv"></div>
                <button onclick="openAddDesign()">➕ ADD DESIGN</button>
            </div>

            <div id="sheet" class="page">
                <button class="back-btn" onclick="goBack()">← BACK</button>
                <div class="title" id="sheetTitle"></div>
                <div class="filter-box">
                    <input type="text" id="tailorF" placeholder="Filter Tailor" onkeyup="drawSheet()">
                    <input type="text" id="sizeF" placeholder="Filter Size" onkeyup="drawSheet()">
                </div>
                <div id="sheetDiv"></div>
                <button onclick="openAddDate()">📅 ADD DATE</button>
            </div>

            <div id="chat" class="page">
                <div class="title">💬 GROUPS</div>
                <div id="groupsDiv"></div>
                <button onclick="openAddGroup()">➕ ADD GROUP</button>
            </div>

            <div id="chatDetail" class="page">
                <button class="back-btn" onclick="goBack()">← BACK</button>
                <div id="msgsDiv" style="height:300px;overflow-y:auto;background:white;padding:10px;border-radius:5px;margin-bottom:10px;"></div>
                <div style="display:flex;gap:10px;">
                    <input type="text" id="msgText" placeholder="Message" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:5px;">
                    <button onclick="sendMsg()" style="width:auto;margin:0;padding:10px 15px;">Send</button>
                </div>
            </div>

            <div id="register" class="page">
                <div class="title">📋 REGISTER</div>
                <div id="regPartiesDiv"></div>
            </div>

            <div id="registerDetail" class="page">
                <button class="back-btn" onclick="goBack()">← BACK</button>
                <div class="title" id="regTitle"></div>
                <div class="filter-box">
                    <input type="text" id="regDateF" placeholder="Filter Date" onkeyup="drawRegister()">
                    <input type="number" id="regDispatchF" placeholder="Filter Dispatch" onkeyup="drawRegister()">
                </div>
                <table><tr><th>DATE</th><th>DISPATCH</th><th>TYPE</th><th>RETURN</th><th>DEL</th></tr><tbody id="regBody"></tbody></table>
                <button onclick="openAddReg()">➕ ADD</button>
            </div>

            <div id="daybook" class="page">
                <div class="title">📖 DAY BOOK</div>
                <div id="dbPartiesDiv"></div>
            </div>

            <div id="daybookDetail" class="page">
                <button class="back-btn" onclick="goBack()">← BACK</button>
                <div class="title" id="dbTitle"></div>
                <div class="filter-box">
                    <input type="text" id="dbDateF" placeholder="Filter Date" onkeyup="drawDaybook()">
                    <input type="number" id="dbPcsF" placeholder="Filter PCS" onkeyup="drawDaybook()">
                    <input type="text" id="dbDesignF" placeholder="Filter Design" onkeyup="drawDaybook()">
                </div>
                <table><tr><th>DATE</th><th>PCS</th><th>DESIGN</th><th>DEL</th></tr><tbody id="dbBody"></tbody></table>
                <button onclick="openAddDb()">➕ ADD</button>
            </div>

            <div id="reminder" class="page">
                <div class="title">📌 REMINDERS</div>
                <div class="filter-box">
                    <input type="text" id="remSearchF" placeholder="Search" onkeyup="drawReminders()">
                    <div style="display:flex;gap:5px;">
                        <button onclick="remFilter='all';drawReminders()" style="font-size:12px;">All</button>
                        <button onclick="remFilter='pending';drawReminders()" style="background:#e74c3c;font-size:12px;">Pending</button>
                        <button onclick="remFilter='done';drawReminders()" style="background:#27ae60;font-size:12px;">Done</button>
                    </div>
                </div>
                <div id="remDiv"></div>
                <button onclick="openAddRem()">➕ ADD REMINDER</button>
            </div>
        </div>

        <div class="nav">
            <button class="nav-btn active" onclick="goPage('home')">🏠</button>
            <button class="nav-btn" onclick="goPage('chat')">💬</button>
            <button class="nav-btn" onclick="goPage('register')">📋</button>
            <button class="nav-btn" onclick="goPage('daybook')">📖</button>
            <button class="nav-btn" onclick="goPage('reminder')">📌</button>
        </div>
    </div>

    <!-- MODALS -->
    <div id="partyModal" class="modal">
        <div class="modal-content">
            <h2>Add Party</h2>
            <div class="form-group">
                <label>Party Name:</label>
                <input type="text" id="partyName" placeholder="e.g., Anas Arkas">
            </div>
            <div class="form-buttons">
                <button onclick="saveParty()">✅ Save</button>
                <button onclick="closeModal('partyModal')" style="background:#95a5a6;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="designModal" class="modal">
        <div class="modal-content">
            <h2>Add Design</h2>
            <div class="form-group">
                <label>Design Name:</label>
                <input type="text" id="designName">
            </div>
            <div class="form-buttons">
                <button onclick="saveDesign()">✅ Save</button>
                <button onclick="closeModal('designModal')" style="background:#95a5a6;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="dateModal" class="modal">
        <div class="modal-content">
            <h2>Add Date</h2>
            <div class="form-group">
                <label>Date:</label>
                <input type="text" id="dateVal" placeholder="5 Mar">
            </div>
            <div class="form-buttons">
                <button onclick="saveDate()">✅ Save</button>
                <button onclick="closeModal('dateModal')" style="background:#95a5a6;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="groupModal" class="modal">
        <div class="modal-content">
            <h2>Add Group</h2>
            <div class="form-group">
                <label>Group Name:</label>
                <input type="text" id="groupName">
            </div>
            <div class="form-buttons">
                <button onclick="saveGroup()">✅ Save</button>
                <button onclick="closeModal('groupModal')" style="background:#95a5a6;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="regModal" class="modal">
        <div class="modal-content">
            <h2>Add Register Entry</h2>
            <div class="form-group"><label>Date:</label><input type="text" id="regDate" placeholder="5 Mar"></div>
            <div class="form-group"><label>Dispatch:</label><input type="number" id="regDispatch"></div>
            <div class="form-group"><label>Type:</label><select id="regType"><option>PCS</option><option>SET</option></select></div>
            <div class="form-group"><label>Return:</label><input type="number" id="regReturn" value="0"></div>
            <div class="form-buttons">
                <button onclick="saveReg()">✅ Save</button>
                <button onclick="closeModal('regModal')" style="background:#95a5a6;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="dbModal" class="modal">
        <div class="modal-content">
            <h2>Add Daybook Entry</h2>
            <div class="form-group"><label>Date:</label><input type="text" id="dbDate" placeholder="5 Mar"></div>
            <div class="form-group"><label>PCS:</label><input type="number" id="dbPcs"></div>
            <div class="form-group"><label>Design:</label><input type="text" id="dbDesign"></div>
            <div class="form-buttons">
                <button onclick="saveDb()">✅ Save</button>
                <button onclick="closeModal('dbModal')" style="background:#95a5a6;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="remModal" class="modal">
        <div class="modal-content">
            <h2>Add Reminder</h2>
            <div class="form-group"><label>Task:</label><textarea id="remText" style="height:80px;"></textarea></div>
            <div class="form-group">
                <label>Voice:</label><br>
                <button type="button" id="voiceBtn" onclick="toggleVoice()" style="background:#e74c3c;margin-top:5px;">🎙️ Start Recording</button>
                <button type="button" id="playBtn" onclick="playVoice()" style="background:#27ae60;display:none;margin-top:5px;">▶️ Play</button>
                <button type="button" id="clearBtn" onclick="clearVoice()" style="background:#95a5a6;display:none;margin-top:5px;">✕ Clear</button>
                <div id="voiceStatus" style="font-size:11px;color:#999;margin-top:5px;"></div>
            </div>
            <div class="form-group"><label>Date:</label><input type="text" id="remDate" placeholder="7 Mar"></div>
            <div class="form-group"><label>Priority:</label><select id="remPriority"><option>Normal</option><option>Urgent</option></select></div>
            <div class="form-buttons">
                <button onclick="saveRem()">✅ Save</button>
                <button onclick="closeModal('remModal')" style="background:#95a5a6;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let curParty = null, curDesign = null, curRegParty = null, curDbParty = null, curGroup = null;
        let voiceData = null, mediaRec = null, remFilter = 'all';

        function goPage(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            let idx = ['home','chat','register','daybook','reminder'].indexOf(p);
            document.querySelectorAll('.nav-btn')[idx].classList.add('active');
            if(p === 'home') loadParties();
            else if(p === 'chat') loadGroups();
            else if(p === 'register') loadRegParties();
            else if(p === 'daybook') loadDbParties();
            else if(p === 'reminder') drawReminders();
        }

        function goBack() {
            if(curDesign) { curDesign = null; document.getElementById('sheet').classList.remove('active'); document.getElementById('designs').classList.add('active'); }
            else if(curRegParty) { curRegParty = null; document.getElementById('registerDetail').classList.remove('active'); document.getElementById('register').classList.add('active'); loadRegParties(); }
            else if(curDbParty) { curDbParty = null; document.getElementById('daybookDetail').classList.remove('active'); document.getElementById('daybook').classList.add('active'); loadDbParties(); }
            else if(curGroup) { curGroup = null; document.getElementById('chatDetail').classList.remove('active'); document.getElementById('chat').classList.add('active'); }
            else { curParty = null; document.getElementById('designs').classList.remove('active'); document.getElementById('home').classList.add('active'); }
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // PARTY
        function loadParties() {
            let p = JSON.parse(localStorage.getItem('parties') || '[]');
            let h = '';
            p.forEach(x => h += `<div class="item" onclick="openParty('${x.id}','${x.n}')"><div>📦 ${x.n}</div></div>`);
            document.getElementById('partiesDiv').innerHTML = h || '<p style="color:#999;">No parties</p>';
        }
        function openAddParty() { document.getElementById('partyName').value = ''; document.getElementById('partyModal').classList.add('active'); }
        function saveParty() {
            let n = document.getElementById('partyName').value.trim();
            if(!n) { alert('Enter party name!'); return; }
            let p = JSON.parse(localStorage.getItem('parties') || '[]');
            p.push({id: Date.now(), n});
            localStorage.setItem('parties', JSON.stringify(p));
            closeModal('partyModal');
            loadParties();
        }
        function openParty(id, n) {
            curParty = {id, n};
            document.getElementById('home').classList.remove('active');
            document.getElementById('designs').classList.add('active');
            document.getElementById('desTitle').textContent = `🎨 ${n}`;
            loadDesigns();
        }

        // DESIGN
        function loadDesigns() {
            let d = JSON.parse(localStorage.getItem(`des_${curParty.id}`) || '[]');
            let h = '';
            d.forEach(x => h += `<div class="item" onclick="openDesign('${x.id}','${x.n}')"><div>🎨 ${x.n}</div></div>`);
            document.getElementById('designsDiv').innerHTML = h || '<p style="color:#999;">No designs</p>';
        }
        function openAddDesign() { document.getElementById('designName').value = ''; document.getElementById('designModal').classList.add('active'); }
        function saveDesign() {
            let n = document.getElementById('designName').value.trim();
            if(!n) { alert('Enter design name!'); return; }
            let d = JSON.parse(localStorage.getItem(`des_${curParty.id}`) || '[]');
            d.push({id: Date.now(), n});
            localStorage.setItem(`des_${curParty.id}`, JSON.stringify(d));
            closeModal('designModal');
            loadDesigns();
        }
        function openDesign(id, n) {
            curDesign = {id, n};
            document.getElementById('designs').classList.remove('active');
            document.getElementById('sheet').classList.add('active');
            document.getElementById('sheetTitle').textContent = `${curParty.n} | 🎨 ${n}`;
            drawSheet();
        }

        // SHEET
        function drawSheet() {
            let s = JSON.parse(localStorage.getItem(`sheet_${curParty.id}_${curDesign.id}`) || '{"dates":[],"szs":["XXS","XS","S","M","L","XL","2XL","3XL"],"data":{}}');
            let tf = document.getElementById('tailorF').value.toLowerCase();
            let sf = document.getElementById('sizeF').value.toUpperCase();
            let h = '<table><tr><th>TAILOR</th><th>SIZE</th><th>KATE</th><th>SILE</th><th>PEND</th>';
            s.dates.forEach(x => h += `<th>${x}</th>`);
            h += '</tr>';
            s.szs.forEach(sz => {
                if(sf && !sz.includes(sf)) return;
                let t = s.data[`${sz}_tailor`] || '-';
                if(tf && !t.toLowerCase().includes(tf)) return;
                let k = parseInt(s.data[`${sz}_kate`]) || 50, si = parseInt(s.data[`${sz}_sile`]) || 0, p = k - si;
                h += `<tr><td>${t}</td><td>${sz}</td><td>${k}</td><td>${si}</td><td>${p}</td>`;
                s.dates.forEach(x => h += `<td>${s.data[`${sz}_${x}`] || '-'}</td>`);
                h += '</tr>';
            });
            h += '</table>';
            document.getElementById('sheetDiv').innerHTML = h;
        }
        function openAddDate() { document.getElementById('dateVal').value = ''; document.getElementById('dateModal').classList.add('active'); }
        function saveDate() {
            let d = document.getElementById('dateVal').value;
            if(!d) { alert('Enter date!'); return; }
            let s = JSON.parse(localStorage.getItem(`sheet_${curParty.id}_${curDesign.id}`) || '{"dates":[],"szs":["XXS","XS","S","M","L","XL","2XL","3XL"],"data":{}}');
            if(!s.dates.includes(d)) s.dates.push(d);
            localStorage.setItem(`sheet_${curParty.id}_${curDesign.id}`, JSON.stringify(s));
            closeModal('dateModal');
            drawSheet();
        }

        // CHAT
        function loadGroups() {
            let g = JSON.parse(localStorage.getItem('groups') || '[]');
            let h = '';
            g.forEach(x => h += `<div class="item" onclick="openGroup('${x.id}','${x.n}')"><div>💬 ${x.n}</div></div>`);
            document.getElementById('groupsDiv').innerHTML = h || '<p style="color:#999;">No groups</p>';
        }
        function openAddGroup() { document.getElementById('groupName').value = ''; document.getElementById('groupModal').classList.add('active'); }
        function saveGroup() {
            let n = document.getElementById('groupName').value.trim();
            if(!n) { alert('Enter name!'); return; }
            let g = JSON.parse(localStorage.getItem('groups') || '[]');
            g.push({id: Date.now(), n, msgs: []});
            localStorage.setItem('groups', JSON.stringify(g));
            closeModal('groupModal');
            loadGroups();
        }
        function openGroup(id, n) {
            curGroup = {id, n};
            document.getElementById('chat').classList.remove('active');
            document.getElementById('chatDetail').classList.add('active');
            loadMsgs();
        }
        function sendMsg() {
            let t = document.getElementById('msgText').value;
            if(!t) return;
            let gs = JSON.parse(localStorage.getItem('groups') || '[]');
            let g = gs.find(x => x.id == curGroup.id);
            g.msgs.push({t, time: new Date().toLocaleString()});
            localStorage.setItem('groups', JSON.stringify(gs));
            document.getElementById('msgText').value = '';
            loadMsgs();
        }
        function loadMsgs() {
            let g = JSON.parse(localStorage.getItem('groups') || '[]').find(x => x.id == curGroup.id);
            let h = '';
            if(g && g.msgs) g.msgs.forEach(x => h += `<div style="background:#e8f4f8;padding:10px;border-radius:5px;margin-bottom:8px;"><b>${x.t}</b><br><small>${x.time}</small></div>`);
            document.getElementById('msgsDiv').innerHTML = h;
        }

        // REGISTER
        function loadRegParties() {
            let p = JSON.parse(localStorage.getItem('parties') || '[]');
            let h = '';
            p.forEach(x => h += `<div class="item" onclick="openRegParty('${x.id}','${x.n}')"><div>📋 ${x.n}</div></div>`);
            document.getElementById('regPartiesDiv').innerHTML = h;
        }
        function openRegParty(id, n) {
            curRegParty = {id, n};
            document.getElementById('register').classList.remove('active');
            document.getElementById('registerDetail').classList.add('active');
            document.getElementById('regTitle').textContent = `📋 ${n}`;
            drawRegister();
        }
        function drawRegister() {
            let r = JSON.parse(localStorage.getItem(`reg_${curRegParty.id}`) || '[]');
            let df = document.getElementById('regDateF').value.toLowerCase();
            let dsf = document.getElementById('regDispatchF').value;
            let h = '';
            r.forEach((x, i) => {
                if((df && !x.date.toLowerCase().includes(df)) || (dsf && x.dispatch.toString() !== dsf)) return;
                h += `<tr><td>${x.date}</td><td>${x.dispatch}</td><td>${x.type}</td><td>${x.ret}</td><td><button onclick="delReg(${i})" style="background:#e74c3c;width:auto;margin:0;padding:5px 8px;">🗑️</button></td></tr>`;
            });
            document.getElementById('regBody').innerHTML = h;
        }
        function openAddReg() { document.getElementById('regDate').value = ''; document.getElementById('regDispatch').value = ''; document.getElementById('regModal').classList.add('active'); }
        function saveReg() {
            let date = document.getElementById('regDate').value, dispatch = parseInt(document.getElementById('regDispatch').value), type = document.getElementById('regType').value, ret = parseInt(document.getElementById('regReturn').value) || 0;
            if(!date || !dispatch) { alert('Fill all!'); return; }
            let r = JSON.parse(localStorage.getItem(`reg_${curRegParty.id}`) || '[]');
            r.push({date, dispatch, type, ret});
            localStorage.setItem(`reg_${curRegParty.id}`, JSON.stringify(r));
            closeModal('regModal');
            drawRegister();
        }
        function delReg(i) {
            if(!confirm('Delete?')) return;
            let r = JSON.parse(localStorage.getItem(`reg_${curRegParty.id}`) || '[]');
            r.splice(i, 1);
            localStorage.setItem(`reg_${curRegParty.id}`, JSON.stringify(r));
            drawRegister();
        }

        // DAYBOOK
        function loadDbParties() {
            let p = JSON.parse(localStorage.getItem('parties') || '[]');
            let h = '';
            p.forEach(x => h += `<div class="item" onclick="openDbParty('${x.id}','${x.n}')"><div>📖 ${x.n}</div></div>`);
            document.getElementById('dbPartiesDiv').innerHTML = h;
        }
        function openDbParty(id, n) {
            curDbParty = {id, n};
            document.getElementById('daybook').classList.remove('active');
            document.getElementById('daybookDetail').classList.add('active');
            document.getElementById('dbTitle').textContent = `📖 ${n}`;
            drawDaybook();
        }
        function drawDaybook() {
            let d = JSON.parse(localStorage.getItem(`db_${curDbParty.id}`) || '[]');
            let dtf = document.getElementById('dbDateF').value.toLowerCase();
            let pf = document.getElementById('dbPcsF').value;
            let dnf = document.getElementById('dbDesignF').value.toLowerCase();
            let h = '';
            d.forEach((x, i) => {
                if((dtf && !x.date.toLowerCase().includes(dtf)) || (pf && x.pcs.toString() !== pf) || (dnf && !x.design.toLowerCase().includes(dnf))) return;
                h += `<tr><td>${x.date}</td><td>${x.pcs}</td><td>${x.design}</td><td><button onclick="delDb(${i})" style="background:#e74c3c;width:auto;margin:0;padding:5px 8px;">🗑️</button></td></tr>`;
            });
            document.getElementById('dbBody').innerHTML = h;
        }
        function openAddDb() { document.getElementById('dbDate').value = ''; document.getElementById('dbPcs').value = ''; document.getElementById('dbDesign').value = ''; document.getElementById('dbModal').classList.add('active'); }
        function saveDb() {
            let date = document.getElementById('dbDate').value, pcs = parseInt(document.getElementById('dbPcs').value), design = document.getElementById('dbDesign').value;
            if(!date || !pcs || !design) { alert('Fill all!'); return; }
            let d = JSON.parse(localStorage.getItem(`db_${curDbParty.id}`) || '[]');
            d.push({date, pcs, design});
            localStorage.setItem(`db_${curDbParty.id}`, JSON.stringify(d));
            closeModal('dbModal');
            drawDaybook();
        }
        function delDb(i) {
            if(!confirm('Delete?')) return;
            let d = JSON.parse(localStorage.getItem(`db_${curDbParty.id}`) || '[]');
            d.splice(i, 1);
            localStorage.setItem(`db_${curDbParty.id}`, JSON.stringify(d));
            drawDaybook();
        }

        // REMINDERS
        function drawReminders() {
            let r = JSON.parse(localStorage.getItem('reminders') || '[]');
            let sf = document.getElementById('remSearchF').value.toLowerCase();
            let h = '';
            r.forEach((x, i) => {
                if(remFilter !== 'all' && x.status !== remFilter) return;
                if(sf && !x.task.toLowerCase().includes(sf)) return;
                h += `<div style="background:white;padding:12px;border-radius:5px;margin-bottom:10px;border-left:4px solid ${x.status==='done'?'#27ae60':'#e74c3c'};">
                    <div style="font-weight:bold;">${x.task} ${x.voice?'🎤':''}</div>
                    <div style="font-size:12px;color:#999;">Date: ${x.date} | ${x.status==='done'?'✅':'⏳'}</div>
                    <div style="display:flex;gap:5px;margin-top:8px;">
                        ${x.voice?`<button onclick="playVoice2(${i})" style="flex:1;padding:5px;background:#3498db;font-size:11px;">▶️</button>`:''}
                        ${x.status==='pending'?`<button onclick="markDone(${i})" style="flex:1;padding:5px;background:#27ae60;font-size:11px;">✓ Done</button>`:''}
                        <button onclick="delRem(${i})" style="flex:1;padding:5px;background:#e74c3c;font-size:11px;">🗑️</button>
                    </div>
                </div>`;
            });
            document.getElementById('remDiv').innerHTML = h || '<p style="color:#999;">No reminders</p>';
        }
        function openAddRem() {
            document.getElementById('remText').value = '';
            document.getElementById('remDate').value = '';
            voiceData = null;
            updateVoiceUI();
            document.getElementById('remModal').classList.add('active');
        }
        function saveRem() {
            let task = document.getElementById('remText').value, date = document.getElementById('remDate').value, pri = document.getElementById('remPriority').value;
            if(!task || !date) { alert('Fill all!'); return; }
            let r = JSON.parse(localStorage.getItem('reminders') || '[]');
            r.push({task, date, pri, voice: voiceData, status: 'pending'});
            localStorage.setItem('reminders', JSON.stringify(r));
            closeModal('remModal');
            drawReminders();
        }
        function markDone(i) {
            let r = JSON.parse(localStorage.getItem('reminders') || '[]');
            r[i].status = 'done';
            localStorage.setItem('reminders', JSON.stringify(r));
            drawReminders();
        }
        function delRem(i) {
            if(!confirm('Delete?')) return;
            let r = JSON.parse(localStorage.getItem('reminders') || '[]');
            r.splice(i, 1);
            localStorage.setItem('reminders', JSON.stringify(r));
            drawReminders();
        }
        function toggleVoice() {
            if(document.getElementById('voiceBtn').textContent.includes('Start')) startVoice();
            else stopVoice();
        }
        function startVoice() {
            navigator.mediaDevices.getUserMedia({audio: true}).then(s => {
                mediaRec = new MediaRecorder(s);
                let ch = [];
                mediaRec.ondataavailable = e => ch.push(e.data);
                mediaRec.onstop = () => {
                    let b = new Blob(ch, {type: 'audio/webm'});
                    let fr = new FileReader();
                    fr.onload = () => { voiceData = fr.result; updateVoiceUI(); document.getElementById('voiceStatus').textContent = '✅ Recorded!'; };
                    fr.readAsDataURL(b);
                };
                mediaRec.start();
                document.getElementById('voiceBtn').textContent = '⏹️ Stop';
                document.getElementById('voiceStatus').textContent = '🔴 Recording...';
            }).catch(() => alert('Mic access denied'));
        }
        function stopVoice() {
            if(mediaRec) {
                mediaRec.stop();
                mediaRec.stream.getTracks().forEach(t => t.stop());
                document.getElementById('voiceBtn').textContent = '🎙️ Start Recording';
            }
        }
        function updateVoiceUI() {
            document.getElementById('playBtn').style.display = voiceData ? 'block' : 'none';
            document.getElementById('clearBtn').style.display = voiceData ? 'block' : 'none';
        }
        function playVoice() { if(voiceData) new Audio(voiceData).play(); }
        function clearVoice() { voiceData = null; updateVoiceUI(); document.getElementById('voiceStatus').textContent = ''; }
        function playVoice2(i) { let r = JSON.parse(localStorage.getItem('reminders') || '[]')[i]; if(r.voice) new Audio(r.voice).play(); }

        window.addEventListener('load', loadParties);
    </script>
</body>
</html>
